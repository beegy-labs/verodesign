name: Release (verodesign)

# Triggered only by changes inside packages/. Builds, runs WCAG/typecheck
# gates, then either opens a "Version Packages" PR (gathering pending
# Changesets) or publishes already-versioned packages to GHPR.

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.changeset/**'

concurrency:
  group: release-verodesign
  cancel-in-progress: false

permissions:
  contents: write       # changesets needs to push the version PR
  pull-requests: write  # changesets opens the PR
  packages: write       # publish to GHPR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@verobee'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Validate (WCAG, schema, types)
        run: pnpm validate

      - name: Test
        run: pnpm test

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
