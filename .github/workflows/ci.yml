name: CI (verodesign)

# PR checks for any package change. No publish — that happens on merge in
# release.yml.

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'turbo.json'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.changeset/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm validate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Verify changeset present
        if: github.event_name == 'pull_request'
        run: |
          # Block merge if package files changed without a changeset.
          if git diff --name-only origin/main...HEAD | grep -qE '^packages/'; then
            if ! git diff --name-only origin/main...HEAD | grep -qE '^\.changeset/[a-z0-9-]+\.md$'; then
              echo "::error::Package files changed but no changeset added. Run 'pnpm changeset'."
              exit 1
            fi
          fi
